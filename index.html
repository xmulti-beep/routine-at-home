<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="허리 운동">
<title>허리 운동 루틴</title>
<style>
:root{
  --bg:#0f0f13;--surface:#1a1a22;--surface2:#22222e;
  --border:rgba(255,255,255,0.08);--text:#f0f0f0;--muted:#888;
  --teal:#2dd4a0;--teal-dim:rgba(45,212,160,0.12);
  --pink:#f472b6;--pink-dim:rgba(244,114,182,0.12);
  --amber:#fbbf24;--amber-dim:rgba(251,191,36,0.12);
  --blue:#5b9cf6;--blue-dim:rgba(91,156,246,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:48px;}
.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);padding:52px 20px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.header h1{font-size:20px;font-weight:700;}
.header p{font-size:12px;color:var(--muted);margin-top:3px;}
.stats{display:flex;gap:8px;margin-top:14px;}
.stat{flex:1;background:rgba(255,255,255,0.05);border-radius:10px;padding:8px;text-align:center;}
.stat-v{font-size:13px;font-weight:700;color:var(--teal);}
.stat-l{font-size:10px;color:var(--muted);margin-top:1px;}
.section-header{display:flex;align-items:center;gap:8px;padding:20px 16px 8px;}
.section-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.section-title{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);}
.section-badge{font-size:10px;border-radius:20px;padding:2px 8px;font-weight:500;}
.card{margin:0 12px 8px;background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden;}
.card.open{border-color:rgba(255,255,255,0.18);}
.card-header{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer;user-select:none;}
.card-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.card-info{flex:1;min-width:0;}
.card-name{font-size:14px;font-weight:700;}
.card-sub{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-badge{font-size:10px;color:var(--muted);background:var(--surface2);border-radius:20px;padding:3px 8px;white-space:nowrap;flex-shrink:0;}
.card-arrow{font-size:10px;color:var(--muted);flex-shrink:0;transition:transform 0.25s;margin-left:4px;}
.card.open .card-arrow{transform:rotate(180deg);}
.card-body{display:none;padding:0 14px 14px;border-top:1px solid var(--border);}
.card.open .card-body{display:block;}
.how-to{font-size:13px;line-height:1.7;color:#ccc;margin-top:12px;margin-bottom:10px;}
.caution{background:var(--amber-dim);border-left:3px solid var(--amber);border-radius:0 8px 8px 0;padding:8px 10px;font-size:12px;color:var(--amber);margin-bottom:12px;}
.timer-launch-btn{display:flex;align-items:center;gap:10px;background:var(--pink-dim);border:1px solid rgba(244,114,182,0.3);border-radius:10px;padding:10px 14px;cursor:pointer;width:100%;font-family:inherit;margin-bottom:8px;}
.timer-launch-btn:active{opacity:0.8;}
.timer-launch-icon{width:26px;height:26px;background:var(--pink);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;}
.timer-launch-name{font-size:13px;font-weight:500;color:var(--pink);}
.timer-launch-sub{font-size:11px;color:rgba(244,114,182,0.6);margin-top:1px;}
.yt-btn{display:flex;align-items:center;gap:10px;background:rgba(255,0,0,0.08);border:1px solid rgba(255,0,0,0.2);border-radius:10px;padding:10px 12px;cursor:pointer;text-decoration:none;width:100%;}
.yt-btn:active{background:rgba(255,0,0,0.15);}
.yt-icon{width:26px;height:26px;background:#FF0000;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.yt-play{width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:8px solid #fff;margin-left:2px;}
.yt-name{font-size:13px;font-weight:500;color:#ff8080;}
.yt-src{font-size:11px;color:rgba(255,128,128,0.6);margin-top:1px;}
.warn{margin:16px 12px 0;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);border-radius:12px;padding:12px 14px;font-size:12px;color:#fca5a5;line-height:1.6;}

/* 슬라이드 패널 공통 */
.panel{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:500;overflow-y:auto;transform:translateX(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);}
.panel.open{transform:translateX(0);}
.panel-header{background:var(--surface);border-bottom:1px solid var(--border);padding:48px 20px 14px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;}
.panel-back{background:transparent;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:0 4px;line-height:1;}
.panel-title{font-size:16px;font-weight:700;}
.mute-btn{background:rgba(255,255,255,0.08);border:none;border-radius:20px;padding:6px 12px;font-size:12px;color:var(--muted);cursor:pointer;font-family:inherit;margin-left:auto;}

/* 타이머 공통 UI */
.t-set-dots{display:flex;gap:8px;padding:16px 20px 0;justify-content:center;}
.t-set-dot{width:32px;height:4px;border-radius:2px;background:rgba(255,255,255,0.1);transition:background 0.3s;}
.t-set-dot.done{background:var(--teal);}
.t-set-dot.active{background:var(--pink);}
.t-rep-row{display:flex;flex-wrap:wrap;gap:6px;padding:12px 20px 0;justify-content:center;max-width:360px;margin:0 auto;}
.t-rep-dot{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);transition:all 0.3s;}
.t-rep-dot.done{background:var(--teal);border-color:var(--teal);color:#0a0a0f;font-weight:700;}
.t-rep-dot.active{background:var(--pink);border-color:var(--pink);color:#0a0a0f;font-weight:700;}
.t-lr-row{display:flex;gap:10px;padding:12px 20px 0;justify-content:center;}
.t-lr-box{flex:1;max-width:150px;border-radius:12px;padding:10px;text-align:center;border:1px solid var(--border);background:var(--surface);transition:all 0.3s;}
.t-lr-box.active{border-color:rgba(244,114,182,0.4);background:rgba(244,114,182,0.1);}
.t-lr-box.done{border-color:rgba(45,212,160,0.4);background:rgba(45,212,160,0.08);}
.t-lr-label{font-size:11px;color:var(--muted);margin-bottom:4px;}
.t-lr-dots{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:4px;}
.t-lr-dot{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);font-size:9px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all 0.3s;}
.t-lr-dot.done{background:var(--teal);border-color:var(--teal);color:#0a0a0f;font-weight:700;}
.t-lr-dot.active{background:var(--pink);border-color:var(--pink);color:#0a0a0f;font-weight:700;}
.t-main{width:100%;max-width:420px;margin:0 auto;padding:20px 20px 0;display:flex;flex-direction:column;align-items:center;}
.t-phase{font-size:13px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:6px 18px;border-radius:20px;margin-bottom:16px;}
.t-badge{font-size:26px;font-weight:700;margin-bottom:10px;}
.t-circle{position:relative;width:210px;height:210px;margin-bottom:14px;}
.t-circle svg{transform:rotate(-90deg);}
.t-circle-bg{fill:none;stroke:rgba(255,255,255,0.06);stroke-width:8;}
.t-circle-prog{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 0.5s linear,stroke 0.3s;}
.t-circle-inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.t-num{font-size:68px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;}
.t-sub{font-size:12px;color:var(--muted);margin-top:4px;}
.t-kor{font-size:34px;font-weight:700;height:44px;color:var(--teal);margin-bottom:14px;letter-spacing:0.05em;}
.t-instr{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;width:100%;margin-bottom:18px;font-size:13px;line-height:1.65;color:#bbb;text-align:center;}
.t-btns{display:flex;gap:10px;width:100%;}
.t-btn{flex:1;padding:15px;border-radius:14px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform 0.1s;}
.t-btn:active{transform:scale(0.97);}
.t-btn-go{background:var(--teal);color:#0a0a0f;}
.t-btn-rst{background:var(--surface);border:1px solid var(--border);color:var(--muted);flex:0 0 56px;font-size:18px;}
.t-done{text-align:center;padding:32px 20px;}
</style>
</head>
<body>

<div class="header">
  <h1>🦴 경증 디스크 아침 루틴</h1>
  <p>정선근 교수 원칙 · 맥길 빅3 · 굴곡 제로</p>
  <div class="stats">
    <div class="stat"><div class="stat-v">35분+</div><div class="stat-l">총 시간</div></div>
    <div class="stat"><div class="stat-v">12가지</div><div class="stat-l">동작</div></div>
    <div class="stat"><div class="stat-v">맥길 빅3</div><div class="stat-l">포함</div></div>
    <div class="stat"><div class="stat-v">굴곡 제로</div><div class="stat-l">정선근 원칙</div></div>
  </div>
</div>

<div id="app"></div>
<div class="warn">⚠️ 통증이 다리로 뻗치는 방사통이 느껴지면 해당 동작을 즉시 중단하고 재활의학과 또는 물리치료사와 상담하세요.</div>

<!-- 패널: 컬업 -->
<div class="panel" id="panelCurlup">
  <div class="panel-header">
    <button class="panel-back" onclick="closePanel('panelCurlup');cuReset()">‹</button>
    <div class="panel-title">맥길 컬업 타이머</div>
    <button class="mute-btn" id="cuMuteBtn" onclick="toggleMute('cu')">🔊 음성</button>
  </div>
  <div class="t-set-dots" id="cuSetDots"></div>
  <div class="t-rep-row" id="cuRepDots"></div>
  <div class="t-main" id="cuMain"></div>
</div>

<!-- 패널: 사이드플랭크 -->
<div class="panel" id="panelSp">
  <div class="panel-header">
    <button class="panel-back" onclick="closePanel('panelSp');spReset()">‹</button>
    <div class="panel-title">사이드 플랭크 타이머</div>
    <button class="mute-btn" id="spMuteBtn" onclick="toggleMute('sp')">🔊 음성</button>
  </div>
  <div class="t-set-dots" id="spSetDots"></div>
  <div class="t-lr-row" id="spSideInd"></div>
  <div class="t-main" id="spMain"></div>
</div>

<!-- 패널: 버드독 -->
<div class="panel" id="panelBd">
  <div class="panel-header">
    <button class="panel-back" onclick="closePanel('panelBd');bdReset()">‹</button>
    <div class="panel-title">버드독 타이머</div>
    <button class="mute-btn" id="bdMuteBtn" onclick="toggleMute('bd')">🔊 음성</button>
  </div>
  <div class="t-set-dots" id="bdSetDots"></div>
  <div class="t-lr-row" id="bdRepRow"></div>
  <div class="t-main" id="bdMain"></div>
</div>

<!-- 패널: 범용 -->
<div class="panel" id="panelGp">
  <div class="panel-header">
    <button class="panel-back" onclick="closePanel('panelGp');gpReset()">‹</button>
    <div class="panel-title" id="gpTitle">타이머</div>
    <button class="mute-btn" id="gpMuteBtn" onclick="toggleMute('gp')">🔊 음성</button>
  </div>
  <div class="t-set-dots" id="gpSetDots"></div>
  <div id="gpSubDots"></div>
  <div class="t-main" id="gpMain"></div>
</div>

<script>

  {phase:"1단계 — 맥킨지 신전",time:"5분",color:"#5b9cf6",dim:"rgba(91,156,246,0.15)",items:[

var openIdx=null;

function getEx(idx){
  var c=0;
  for(var i=0;i<DATA.length;i++)
    for(var j=0;j<DATA[i].items.length;j++){
      if(c===idx)return DATA[i].items[j];
      c++;
    }
}

function toggle(idx){
  openIdx=openIdx===idx?null:idx;
  renderList();
}

function openPanel(id){
  document.getElementById(id).classList.add("open");
}
function closePanel(id){
  document.getElementById(id).classList.remove("open");
}

function launchTimer(idx){
  var ex=getEx(idx);
  var t=ex.timer;
  if(t.type==="curlup"){openPanel("panelCurlup");cuReset();setTimeout(cuStart,300);}
  else if(t.type==="sideplank"){openPanel("panelSp");spReset();setTimeout(spStart,300);}
  else if(t.type==="birddog"){openPanel("panelBd");bdReset();setTimeout(bdStart,300);}
  else{
    gpCfg=t; gpExName=ex.name;
    document.getElementById("gpTitle").textContent=ex.name+" 타이머";
    openPanel("panelGp");
    gpReset();
    setTimeout(gpStart,300);
  }
}

function renderList(){
  var html="",gi=0;
  DATA.forEach(function(ph){
    html+='<div class="section-header">';
    html+='<div class="section-dot" style="background:'+ph.color+'"></div>';
    html+='<div class="section-title">'+ph.phase+'</div>';
    html+='<div class="section-badge" style="background:'+ph.dim+';color:'+ph.color+'">'+ph.time+'</div>';

    ph.items.forEach(function(ex){
      var i=gi++, isOpen=openIdx===i;
      html+='<div class="card'+(isOpen?" open":"")+'">';
      html+='<div class="card-header" onclick="toggle('+i+')">';
      html+='<div class="card-icon" style="background:'+ph.dim+'">'+ex.icon+'</div>';
      html+='<div class="card-info">';
      html+='<div class="card-name">'+ex.name+'</div>';

      html+='</div>';

/* ===== 공통 유틸 ===== */
var audioCtx=null;
var muteState={cu:false,sp:false,bd:false,gp:false};

function toggleMute(key){
  muteState[key]=!muteState[key];
  var ids={cu:"cuMuteBtn",sp:"spMuteBtn",bd:"bdMuteBtn",gp:"gpMuteBtn"};
  document.getElementById(ids[key]).textContent=muteState[key]?"🔇 음성":"🔊 음성";
}

function getACtx(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function beep(freq,mKey){
  if(muteState[mKey])return;
  try{
    var c=getACtx(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.frequency.value=freq||660;g.gain.value=0.25;
    o.start();g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+0.25);o.stop(c.currentTime+0.25);
  }catch(e){}
}

function speak(text,mKey){
  if(muteState[mKey]||!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text);
  u.lang="ko-KR";u.rate=0.92;u.pitch=1.2;
  var vv=window.speechSynthesis.getVoices();
  var v=vv.find(function(v){return v.lang.indexOf("ko")>-1&&(v.name.indexOf("Yuna")>-1||v.name.indexOf("Sora")>-1||v.name.indexOf("Female")>-1);});
  if(!v)v=vv.find(function(v){return v.lang.indexOf("ko")>-1;});
  if(v)u.voice=v;
  window.speechSynthesis.speak(u);
}

var KOR=["하나","둘","셋","넷","다섯","여섯","일곱","여덟","아홉","열","열하나","열둘","열셋","열넷","열다섯","열여섯","열일곱","열여덟","열아홉","스물","스물하나","스물둘","스물셋","스물넷","스물다섯","스물여섯","스물일곱","스물여덟","스물아홉","서른"];

function fmtSec(s){
  var m=Math.floor(s/60),r=s%60;
  return m>0?m+":"+(r<10?"0":"")+r:r+"초";
}

function makeCircle(tick,total,color){
  var r=90,ci=2*Math.PI*r,el=total-tick,off=ci*(1-el/total);
  if(el<0)off=ci;
  return '<div class="t-circle"><svg width="210" height="210" viewBox="0 0 210 210"><circle class="t-circle-bg" cx="105" cy="105" r="'+r+'"/><circle class="t-circle-prog" cx="105" cy="105" r="'+r+'" stroke="'+color+'" stroke-dasharray="'+ci+'" stroke-dashoffset="'+off+'"/></svg><div class="t-circle-inner"><div class="t-num" style="color:'+color+';">'+tick+'</div><div class="t-sub">'+total+'초</div></div></div>';
}

function makeSetDots(set,total,done,elId,activeColor){
  var html="";
  for(var i=1;i<=total;i++){
    var c="t-set-dot";
    if(done||i<set)c+=" done";
    else if(i===set)c+=" active";
    html+='<div class="'+c+'" style="'+(i===set&&!done?"background:"+activeColor:"")+'">&nbsp;</div>';
  }
  document.getElementById(elId).innerHTML=html;
}

var cuS={},cuIv=null;
function cuReset(){
  clearInterval(cuIv);
  window.speechSynthesis&&window.speechSynthesis.cancel();
  cuS={started:false,set:1,rep:1,phase:"idle",tick:0,running:false,done:false};
  document.getElementById("cuSetDots").innerHTML="";
  document.getElementById("cuRepDots").innerHTML="";
  document.getElementById("cuMain").innerHTML="";
}
function cuStart(){
  cuS={started:true,set:1,rep:1,phase:"ready",tick:3,running:true,done:false};
  beep(880,"cu");
  cuIv=setInterval(cuTick,1000);
  cuRender();
}
function cuTick(){
  if(!cuS.running)return;
  cuS.tick--;
  if(cuS.phase==="ready"){
    if(cuS.tick<=0){beep(880,"cu");cuS.phase="hold";cuS.tick=10;}
    cuRender();return;
  }
  if(cuS.phase==="hold"){
    var el=10-cuS.tick;
    if(el>=1&&el<=10)speak(KOR[el-1],"cu");
    if(cuS.tick<=0){
      beep(660,"cu");
      if(cuS.rep<8){cuS.rep++;cuS.phase="rest";cuS.tick=5;}
      else if(cuS.set<3){cuS.set++;cuS.rep=1;cuS.phase="setrest";cuS.tick=10;}
      else{cuS.done=true;cuS.running=false;clearInterval(cuIv);speak("완료! 수고하셨습니다.","cu");}
    }
    cuRender();return;
  }
  if(cuS.phase==="rest"){
    if(cuS.tick<=0){beep(880,"cu");cuS.phase="hold";cuS.tick=10;}
    cuRender();return;
  }
  if(cuS.phase==="setrest"){
    if(cuS.tick<=0){beep(880,"cu");cuS.phase="ready";cuS.tick=3;}
    cuRender();return;
  }
}
function cuPause(){
  cuS.running=!cuS.running;
  if(cuS.running)cuIv=setInterval(cuTick,1000);
  else clearInterval(cuIv);
  cuRender();
}
function cuRender(){
  makeSetDots(cuS.set,3,cuS.done,"cuSetDots","#f472b6");
  var rd="";
  for(var j=1;j<=8;j++){
    var c="t-rep-dot"+(j<cuS.rep||cuS.done?" done":j===cuS.rep?" active":"");
    rd+='<div class="'+c+'">'+j+'</div>';
  }
  document.getElementById("cuRepDots").innerHTML=rd;
  var d=document.getElementById("cuMain");
  if(cuS.done){
    d.innerHTML='<div class="t-done"><div style="font-size:56px">🎉</div><div style="font-size:22px;font-weight:700;color:var(--teal);margin:12px 0 8px">완료!</div><div style="font-size:14px;color:var(--muted)">맥길 컬업 8회 × 3세트</div><div style="margin-top:24px"><button class="t-btn t-btn-go" onclick="cuReset();setTimeout(cuStart,100)">↺ 다시 하기</button></div></div>';
    return;
  }
  if(cuS.phase==="ready"){
    d.innerHTML='<div class="t-phase" style="background:rgba(96,165,250,0.12);color:#60a5fa">'+cuS.rep+'회 준비</div>'+makeCircle(cuS.tick,3,"#60a5fa")+'<div class="t-kor"></div><div class="t-instr">누워서 한쪽 다리 세우기<br>양손을 허리 아래에 넣으세요.</div><div class="t-btns"><button class="t-btn-rst t-btn" onclick="cuReset()">↺</button><button class="t-btn t-btn-go" onclick="cuPause()">'+(cuS.running?"⏸":"▶")+'</button></div>';
    return;
  }
  if(cuS.phase==="hold"){
    var el2=10-cuS.tick;
    var kor=el2>=1&&el2<=10?KOR[el2-1]:"";
    d.innerHTML='<div class="t-phase" style="background:rgba(244,114,182,0.15);color:#f472b6">'+cuS.rep+'회 버티기</div>'+makeCircle(cuS.tick,10,"#f472b6")+'<div class="t-kor">'+kor+'</div><div class="t-instr">머리와 어깨만 살짝 들어 올리기<br>허리는 바닥에 밀착!</div><div class="t-btns"><button class="t-btn-rst t-btn" onclick="cuReset()">↺</button><button class="t-btn t-btn-go" onclick="cuPause()">'+(cuS.running?"⏸":"▶")+'</button></div>';
    return;
  }
  if(cuS.phase==="rest"){
    d.innerHTML='<div class="t-phase" style="background:rgba(255,255,255,0.05);color:var(--muted)">휴식</div>'+makeCircle(cuS.tick,5,"var(--muted)")+'<div class="t-kor"></div><div class="t-instr">잠시 쉬세요.</div><div class="t-btns"><button class="t-btn-rst t-btn" onclick="cuReset()">↺</button><button class="t-btn t-btn-go" onclick="cuPause()">'+(cuS.running?"⏸":"▶")+'</button></div>';
    return;
  }
  if(cuS.phase==="setrest"){
    d.innerHTML='<div class="t-phase" style="background:rgba(251,191,36,0.15);color:#fbbf24">'+(cuS.set-1)+'세트 완료 — 휴식</div>'+makeCircle(cuS.tick,10,"#fbbf24")+'<div class="t-kor"></div><div class="t-instr">호흡을 고르세요.</div><div class="t-btns"><button class="t-btn-rst t-btn" onclick="cuReset()">↺</button><button class="t-btn t-btn-go" onclick="cuS.tick=1;cuRender()">건너뛰기</button></div>';
    return;
  }
}

var spS={},spIv=null;
function spReset(){
  clearInterval(spIv);
  window.speechSynthesis&&window.speechSynthesis.cancel();
  spS={started:false,set:1,phase:"idle",tick:0,running:false,done:false,lDone:false,rDone:false};
  document.getElementById("spSetDots").innerHTML="";
  document.getElementById("spSideInd").innerHTML="";
  document.getElementById("spMain").innerHTML="";
}
function spStart(){
  spS={started:true,set:1,phase:"ready",tick:3,running:true,done:false,lDone:false,rDone:false};
  beep(880,"sp");
  spIv=setInterval(spTick,1000);
  spRender();
}
function spTick(){
  if(!spS.running)return;
  spS.tick--;
  if(spS.phase==="ready"){
    if(spS.tick<=0){beep(880,"sp");spS.phase="left";spS.tick=15;}
    spRender();return;
  }
  if(spS.phase==="left"||spS.phase==="right"){
    var el=15-spS.tick;
    if(el>=1&&el<=15)speak(KOR[el-1],"sp");
    if(spS.tick<=0){
      beep(660,"sp");
      if(spS.phase==="left"){spS.lDone=true;spS.phase="siderest";spS.tick=5;}
      else{
        spS.rDone=true;
        if(spS.set<3){spS.set++;spS.lDone=false;spS.rDone=false;spS.phase="setrest";spS.tick=10;}
        else{spS.done=true;spS.running=false;clearInterval(spIv);speak("완료! 수고하셨습니다.","sp");}
      }
    }
    spRender();return;
  }
  if(spS.phase==="siderest"){
    if(spS.tick<=0){beep(880,"sp");spS.phase="right";spS.tick=15;}
    spRender();return;
  }
  if(spS.phase==="setrest"){
    if(spS.tick<=0){beep(880,"sp");spS.phase="ready";spS.tick=3;}
    spRender();return;
  }
}
function spPause(){
  spS.running=!spS.running;
  if(spS.running)spIv=setInterval(spTick,1000);
  else clearInterval(spIv);
  spRender();
}
function spRender(){
  makeSetDots(spS.set,3,spS.done,"spSetDots","#f472b6");
  var lc="t-lr-box"+(spS.phase==="left"?" active":spS.lDone?" done":"");
  var rc="t-lr-box"+(spS.phase==="right"?" active":spS.rDone?" done":"");
  document.getElementById("spSideInd").innerHTML='<div class="'+lc+'"><div class="t-lr-label">◀ 왼쪽</div><div style="font-size:16px;font-weight:700;color:'+(spS.phase==="left"?"#f472b6":spS.lDone?"var(--teal)":"var(--muted)")+'">15초</div></div><div class="'+rc+'"><div class="t-lr-label">오른쪽 ▶</div><div style="font-size:16px;font-weight:700;color:'+(spS.phase==="right"?"#f472b6":spS.rDone?"var(--teal)":"var(--muted)")+'">15초</div></div>';
  var d=document.getElementById("spMain");
  if(spS.done){
    d.innerHTML='<div class="t-done"><div style="font-size:56px">🎉</div><div style="font-size:22px;font-weight:700;color:var(--teal);margin:12px 0 8px">완료!</div><div style="font-size:14px;color:var(--muted)">사이드 플랭크 좌우 15초 × 3세트</div><div style="margin-top:24px"><button class="t-btn t-btn-go" onclick="spReset();setTimeout(spStart,100)">↺ 다시 하기</button></div></div>';
    return;
  }
  var col="#f472b6",label="",instr="",total=15;
  if(spS.phase==="ready"){col="#60a5fa";label="준비";instr="옆으로 누워 자세를 잡으세요.";total=3;}
  else if(spS.phase==="left"){col="#f472b6";label="◀ 왼쪽 버티기";instr="골반이 처지지 않게!\n발 → 어깨 일직선 유지.";}
  else if(spS.phase==="right"){col="#4ade80";label="오른쪽 ▶ 버티기";instr="골반이 처지지 않게!\n발 → 어깨 일직선 유지.";}
  else if(spS.phase==="siderest"){col="var(--muted)";label="방향 전환";instr="오른쪽으로 돌아누우세요.";total=5;}
  else if(spS.phase==="setrest"){col="#fbbf24";label=(spS.set-1)+"세트 완료 — 휴식";instr="호흡을 고르세요.";total=10;}
  var el3=total-spS.tick;
  var kor=(spS.phase==="left"||spS.phase==="right")&&el3>=1&&el3<=15?KOR[el3-1]:"";
  d.innerHTML='<div class="t-phase" style="background:rgba(0,0,0,0.2);color:'+col+'">'+label+'</div>'+makeCircle(spS.tick,total,col)+'<div class="t-kor">'+kor+'</div><div class="t-instr">'+instr.replace(/\n/g,"<br>")+'</div><div class="t-btns"><button class="t-btn-rst t-btn" onclick="spReset()">↺</button><button class="t-btn t-btn-go" style="background:'+col+'" onclick="spPause()">'+(spS.running?"⏸ 일시정지":"▶ 재개")+'</button></div>';
}

    if(bdS.tick<=0){beep(880,"bd");bdS.phase="left";bdS.tick=8;}
    bdRender();return;
  }
  if(bdS.phase==="left"||bdS.phase==="right"){
    var el=8-bdS.tick;
    if(el>=1&&el<=8)speak(KOR[el-1],"bd");
    if(bdS.tick<=0){
      beep(660,"bd");
      if(bdS.phase==="left"){
        bdS.lReps++;bdS.phase="siderest";bdS.tick=5;
      }else{
        bdS.rReps++;
        if(bdS.rep<6){bdS.rep++;bdS.phase="siderest";bdS.tick=5;}
        else if(bdS.set<3){bdS.set++;bdS.rep=1;bdS.lReps=0;bdS.rReps=0;bdS.phase="setrest";bdS.tick=10;}
        else{bdS.done=true;bdS.running=false;clearInterval(bdIv);speak("완료! 수고하셨습니다.","bd");}
      }
    }
    bdRender();return;
  }
  if(bdS.phase==="siderest"){
    if(bdS.tick<=0){
      beep(880,"bd");
      if(bdS.lReps>bdS.rReps){bdS.phase="right";bdS.tick=8;}
      else{bdS.phase="left";bdS.tick=8;}
    }
    bdRender();return;
  }
  if(bdS.phase==="setrest"){
    if(bdS.tick<=0){beep(880,"bd");bdS.phase="ready";bdS.tick=3;}
    bdRender();return;
  }
}

var gpCfg=null,gpExName="",gpS={},gpIv=null;

function gpReset(){
  clearInterval(gpIv);
  window.speechSynthesis&&window.speechSynthesis.cancel();
  gpS={started:false,set:1,rep:1,side:"left",phase:"idle",tick:0,running:false,done:false,lReps:0,rReps:0};
  document.getElementById("gpSetDots").innerHTML="";
  document.getElementById("gpSubDots").innerHTML="";
  document.getElementById("gpMain").innerHTML="";
}

function gpStart(){
  if(!gpCfg)return;
  var type=gpCfg.type;
  if(type==="lrrep"){
    gpS={started:true,set:1,rep:1,side:"left",phase:"left",tick:9999,running:true,done:false,lReps:0,rReps:0};
    beep(880,"gp");gpIv=setInterval(gpTick,1000);gpRender();return;
  }
  if(type==="countrep"){
    gpS={started:true,set:1,rep:1,side:"left",phase:"count",tick:9999,running:true,done:false,lReps:0,rReps:0};
    beep(880,"gp");gpIv=setInterval(gpTick,1000);gpRender();return;
  }
  if(type==="lrauto"){
    gpS={started:true,set:1,rep:1,side:"left",phase:"ready",tick:3,running:true,done:false,lReps:0,rReps:0};
    beep(880,"gp");gpIv=setInterval(gpTick,1000);gpRender();return;
  }
  gpS={started:true,set:1,rep:1,side:"left",phase:"ready",tick:3,running:true,done:false,lReps:0,rReps:0};
  beep(880,"gp");gpIv=setInterval(gpTick,1000);gpRender();
}

function gpTick(){
  if(!gpS.running||!gpCfg)return;
  var cfg=gpCfg,type=cfg.type;
  gpS.tick--;

  /* 준비 3초 */
  if(gpS.phase==="ready"){
    if(gpS.tick<=0){
      beep(880,"gp");
      if(type==="hold"){gpS.phase="hold";gpS.tick=cfg.holdSec;}
      else if(type==="rephold"){gpS.phase="hold";gpS.tick=cfg.holdSec;}
      else if(type==="lrhold"){gpS.phase="left";gpS.tick=cfg.holdSec;}
      else if(type==="autocount"){gpS.phase="counting";gpS.tick=cfg.repSec;speak(KOR[0],"gp");}
      else if(type==="lrauto"){
        gpS.phase="counting";gpS.tick=cfg.repSec;
        gpS.lReps=0;gpS.rReps=0;gpS.rep=1;
        speak(KOR[0],"gp");
      }
    }
    gpRender();return;
  }

  /* lrauto: 좌우 각 repSec마다 자동 카운트 */
  if(type==="lrauto"&&gpS.phase==="counting"){
    if(gpS.tick<=0){
      var side=gpS.lReps<cfg.reps?"left":"right";
      if(side==="left"){
        gpS.lReps++;
        if(gpS.lReps<cfg.reps){gpS.tick=cfg.repSec;speak(KOR[gpS.lReps],"gp");}
        else{
          /* 왼쪽 완료 → 준비 3초 후 오른쪽 */
          beep(660,"gp");gpS.phase="sideready";gpS.tick=3;
        }
      }else{
        gpS.rReps++;
        if(gpS.rReps<cfg.reps){gpS.tick=cfg.repSec;speak(KOR[gpS.rReps],"gp");}
        else{
          beep(660,"gp");
          if(gpS.set<cfg.sets){gpS.set++;gpS.lReps=0;gpS.rReps=0;gpS.phase="setrest";gpS.tick=cfg.setRest;}
          else{gpS.done=true;gpS.running=false;clearInterval(gpIv);speak("완료! 수고하셨습니다.","gp");}
        }
      }
    }
    gpRender();return;
  }

  /* lrauto: 오른쪽 준비 3초 */
  if(type==="lrauto"&&gpS.phase==="sideready"){
    if(gpS.tick<=0){beep(880,"gp");gpS.phase="counting";gpS.tick=cfg.repSec;speak(KOR[0],"gp");}
    gpRender();return;
  }

  /* 버티기 / 좌우 버티기 */
  if(gpS.phase==="hold"||gpS.phase==="left"||gpS.phase==="right"){
    var el=cfg.holdSec-gpS.tick;
    if(el>=1&&el<=cfg.holdSec&&el<=KOR.length)speak(KOR[el-1],"gp");
    if(gpS.tick<=0){
      beep(660,"gp");
      if(type==="hold"){
        if(gpS.set<cfg.sets){gpS.set++;gpS.phase="setrest";gpS.tick=cfg.setRest;}
        else{gpS.done=true;gpS.running=false;clearInterval(gpIv);speak("완료! 수고하셨습니다.","gp");}
      }
      else if(type==="rephold"){
        if(gpS.rep<cfg.reps){gpS.rep++;gpS.phase="represt";gpS.tick=cfg.restSec;}
        else if(gpS.set<cfg.sets){gpS.set++;gpS.rep=1;gpS.phase="setrest";gpS.tick=cfg.setRest;}
        else{gpS.done=true;gpS.running=false;clearInterval(gpIv);speak("완료! 수고하셨습니다.","gp");}
      }
      else if(type==="lrhold"){
        if(gpS.phase==="left"){gpS.phase="siderest";gpS.tick=cfg.sideRest;}
        else{
          if(gpS.set<cfg.sets){gpS.set++;gpS.phase="setrest";gpS.tick=cfg.setRest;}
          else{gpS.done=true;gpS.running=false;clearInterval(gpIv);speak("완료! 수고하셨습니다.","gp");}
        }
      }
    }
    gpRender();return;
  }

  /* 회 사이 휴식 (rephold) */
  if(gpS.phase==="represt"){
    if(gpS.tick<=0){beep(880,"gp");gpS.phase="hold";gpS.tick=cfg.holdSec;}
    gpRender();return;
  }

  /* 좌우 전환 휴식 (lrhold/lrrep) */
  if(gpS.phase==="siderest"){
    if(gpS.tick<=0){
      beep(880,"gp");
      if(type==="lrhold"){gpS.phase="right";gpS.tick=cfg.holdSec;}
      else if(type==="lrrep"){gpS.phase="right";gpS.tick=9999;}
    }
    gpRender();return;
  }

  /* 세트 휴식 */
  if(gpS.phase==="setrest"){
    if(gpS.tick<=0){
      beep(880,"gp");
      gpS.rep=1;gpS.lReps=0;gpS.rReps=0;
      if(type==="lrrep"){gpS.phase="left";gpS.tick=9999;}
      else if(type==="countrep"){gpS.phase="count";gpS.tick=9999;}
      else{gpS.phase="ready";gpS.tick=3;}
    }
    gpRender();return;
  }

  /* count/left/right (버튼 대기) - tick 건드리지 않음 */
  gpRender();
}

function gpRepDone(side){
  if(!gpCfg)return;
  var cfg=gpCfg,type=cfg.type;
  if(type==="countrep"){
    gpS.rep++;
    if(gpS.rep>cfg.reps){
      beep(660,"gp");
      if(gpS.set<cfg.sets){gpS.set++;gpS.rep=1;gpS.phase="setrest";gpS.tick=cfg.setRest;}
      else{gpS.done=true;gpS.running=false;clearInterval(gpIv);speak("완료! 수고하셨습니다.","gp");}
    }
    gpRender();return;
  }
  if(type==="lrrep"){
    if(side==="left"){
      gpS.lReps++;
      if(gpS.lReps>=cfg.reps){
        beep(660,"gp");
        gpS.phase="siderest";gpS.tick=cfg.sideRest;
      }
    }else{
      gpS.rReps++;
      if(gpS.rReps>=cfg.reps){
        beep(660,"gp");
        if(gpS.set<cfg.sets){
          gpS.set++;gpS.lReps=0;gpS.rReps=0;
          gpS.phase="setrest";gpS.tick=cfg.setRest;
        }else{
          gpS.done=true;gpS.running=false;clearInterval(gpIv);
          speak("완료! 수고하셨습니다.","gp");
        }
      }
    }
    gpRender();return;
  }
}

    var lDots="",rDots="";
    for(var k=1;k<=cfg.reps;k++){
      var lc="t-lr-dot"+(k<=gpS.lReps?" done":gpS.phase==="left"&&k===gpS.lReps+1?" active":"");
      var rc="t-lr-dot"+(k<=gpS.rReps?" done":gpS.phase==="right"&&k===gpS.rReps+1?" active":"");
      lDots+='<div class="'+lc+'">'+k+'</div>';
      rDots+='<div class="'+rc+'">'+k+'</div>';
    }
    var lb="t-lr-box"+(gpS.phase==="left"?" active":"");
    var rb="t-lr-box"+(gpS.phase==="right"?" active":"");
    sd.innerHTML='<div style="display:flex;gap:10px;padding:12px 20px 0;justify-content:center;"><div class="'+lb+'"><div class="t-lr-label" style="color:'+color+'">◀ 왼쪽</div><div class="t-lr-dots">'+lDots+'</div></div><div class="'+rb+'"><div class="t-lr-label" style="color:'+(cfg.colorR||color)+'">오른쪽 ▶</div><div class="t-lr-dots">'+rDots+'</div></div></div>';

    if(gpS.phase==="siderest"){
      d.innerHTML='<div class="t-phase" style="background:rgba(255,255,255,0.05);color:var(--muted)">방향 전환</div>'+makeCircle(gpS.tick,cfg.sideRest,"var(--muted)")+'<div class="t-kor"></div><div class="t-instr">반대쪽으로 돌아누우세요.</div><div class="t-btns"><button class="t-btn-rst t-btn" onclick="gpReset()">↺</button><button class="t-btn t-btn-go" style="background:'+color+'" onclick="gpPause()">'+(gpS.running?"⏸":"▶")+'</button></div>';
      return;
    }
    if(gpS.phase==="setrest"){
      d.innerHTML='<div class="t-phase" style="background:rgba(251,191,36,0.15);color:#fbbf24">'+(gpS.set-1)+'세트 완료 — 휴식</div>'+makeCircle(gpS.tick,cfg.setRest,"#fbbf24")+'<div class="t-kor"></div><div class="t-instr">잠시 쉬세요.</div><div class="t-btns"><button class="t-btn-rst t-btn" onclick="gpReset()">↺</button><button class="t-btn t-btn-go" style="background:'+color+'" onclick="gpS.tick=1;gpRender()">건너뛰기</button></div>';
      return;
    }
    var isLeft=gpS.phase==="left";
    var sideCol=isLeft?color:(cfg.colorR||color);
    var sideLabel=isLeft?"◀ 왼쪽":"오른쪽 ▶";
    var sideInstr=isLeft?(cfg.instrL||""):(cfg.instrR||"");
    var repsNow=isLeft?gpS.lReps:gpS.rReps;
    d.innerHTML='<div class="t-phase" style="background:rgba(0,0,0,0.2);color:'+sideCol+'">'+sideLabel+' — '+(repsNow+1)+'/'+cfg.reps+'회</div><div class="t-badge" style="color:'+sideCol+'">'+(isLeft?"◀":"▶")+'</div><div class="t-kor"></div><div class="t-instr">'+sideInstr.replace(/\n/g,"<br>")+'</div><div class="t-btns"><button class="t-btn-rst t-btn" onclick="gpReset()">↺</button><button class="t-btn t-btn-go" style="background:'+sideCol+';font-size:13px" onclick="gpRepDone(\''+(isLeft?"left":"right")+"')\">✓ "+(repsNow+1)+'회 완료</button></div>';
    return;
  }

  /* hold / rephold / lrhold 공통 렌더 */
  sd.innerHTML="";
  if(type==="rephold"){
    var rd2="";
    for(var m=1;m<=cfg.reps;m++){
      var mc="t-rep-dot"+(m<gpS.rep?" done":m===gpS.rep?" active":"");
      rd2+='<div class="'+mc+'">'+m+'</div>';
    }
    sd.innerHTML='<div class="t-rep-row" style="display:flex;flex-wrap:wrap;gap:6px;padding:12px 20px 0;justify-content:center;max-width:360px;margin:0 auto;">'+rd2+'</div>';
  }

  var col2=color,lbl="",ins="",total=cfg.holdSec,kor2="";
  if(gpS.phase==="ready"){col2="#60a5fa";lbl="준비";ins="자세를 잡으세요.";total=3;}
  else if(gpS.phase==="hold"){
    lbl=type==="rephold"?gpS.rep+"회 버티기":gpS.set+"세트 버티기";
    ins=cfg.instr||"";
    var el3=cfg.holdSec-gpS.tick;
    if(el3>=1&&el3<=cfg.holdSec&&el3<=KOR.length)kor2=KOR[el3-1];
  }
  else if(gpS.phase==="left"||gpS.phase==="right"){
    var isL=gpS.phase==="left";
    col2=isL?color:(cfg.colorR||color);
    lbl=isL?"◀ 왼쪽 버티기":"오른쪽 ▶ 버티기";
    ins=isL?(cfg.instrL||cfg.instr||""):(cfg.instrR||cfg.instr||"");
    var el4=cfg.holdSec-gpS.tick;
    if(el4>=1&&el4<=cfg.holdSec&&el4<=KOR.length)kor2=KOR[el4-1];
  }
  else if(gpS.phase==="represt"){col2="var(--muted)";lbl="다음 회 준비";ins="";total=cfg.restSec;}
  else if(gpS.phase==="siderest"){col2="var(--muted)";lbl="방향 전환";ins="반대쪽으로 돌아누우세요.";total=cfg.sideRest;}
  else if(gpS.phase==="setrest"){col2="#fbbf24";lbl=(gpS.set-1)+"세트 완료 — 휴식";ins="호흡을 고르세요.";total=cfg.setRest;}

  d.innerHTML='<div class="t-phase" style="background:rgba(0,0,0,0.2);color:'+col2+'">'+lbl+'</div>'+makeCircle(gpS.tick,total,col2)+'<div class="t-kor">'+kor2+'</div><div class="t-instr">'+ins.replace(/\n/g,"<br>")+'</div><div class="t-btns"><button class="t-btn-rst t-btn" onclick="gpReset()">↺</button><button class="t-btn t-btn-go" style="background:'+color+'" onclick="gpPause()">'+(gpS.running?"⏸ 일시정지":"▶ 재개")+'</button></div>';
}

/* ===== lrrep siderest: gpTick에서 처리 ===== */
/* gpTick의 "countrep / lrrep: tick 고정" 부분 이전에 siderest 처리 추가 필요 */
/* 이미 gpTick siderest 처리에서 lrrep도 처리됨 */

/* ===== 초기 실행 ===== */
if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};
}
renderList();
</script>
