<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="허리 운동">
<title>허리 운동 루틴</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #888;
    --teal: #2dd4a0;
    --teal-dim: rgba(45,212,160,0.12);
    --blue: #5b9cf6;
    --blue-dim: rgba(91,156,246,0.12);
    --pink: #f472b6;
    --pink-dim: rgba(244,114,182,0.12);
    --amber: #fbbf24;
    --amber-dim: rgba(251,191,36,0.12);
    --red: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }
  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    padding: 52px 20px 24px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .header p { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .stats {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }
  .stat {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 8px;
    text-align: center;
  }
  .stat-v { font-size: 14px; font-weight: 700; color: var(--teal); }
  .stat-l { font-size: 10px; color: var(--muted); margin-top: 1px; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 20px 16px 8px;
  }
  .section-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .section-title { font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }
  .section-badge {
    font-size: 10px; border-radius: 20px; padding: 2px 8px; font-weight: 500;
  }

  .card {
    margin: 0 12px 8px;
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .card.open { border-color: rgba(255,255,255,0.18); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px;
    cursor: pointer;
    user-select: none;
  }
  .card-icon {
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-size: 14px; font-weight: 700; }
  .card-sub { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-badge {
    font-size: 10px; color: var(--muted); background: var(--surface2);
    border-radius: 20px; padding: 3px 8px; white-space: nowrap; flex-shrink: 0;
  }
  .card-arrow { font-size: 10px; color: var(--muted); flex-shrink: 0; transition: transform 0.25s; margin-left: 4px; }
  .card.open .card-arrow { transform: rotate(180deg); }

  .card-body {
    display: none;
    padding: 0 14px 14px;
    border-top: 1px solid var(--border);
  }
  .card.open .card-body { display: block; }

  .how-to {
    font-size: 13px; line-height: 1.7; color: #ccc;
    margin-top: 12px; margin-bottom: 10px;
  }
  .caution {
    background: var(--amber-dim);
    border-left: 3px solid var(--amber);
    border-radius: 0 8px 8px 0;
    padding: 8px 10px;
    font-size: 12px;
    color: var(--amber);
    margin-bottom: 14px;
  }

  .timer-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
  }
  .timer-num {
    font-size: 28px; font-weight: 700; color: var(--teal);
    min-width: 70px; font-variant-numeric: tabular-nums;
  }
  .timer-num.done { color: var(--teal); }
  .tbtn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 14px; font-size: 12px;
    color: var(--text); cursor: pointer; font-family: inherit;
    transition: background 0.15s;
  }
  .tbtn:active { background: rgba(255,255,255,0.12); }
  .tbtn.start { background: var(--teal-dim); border-color: rgba(45,212,160,0.3); color: var(--teal); }
  .prog-track {
    height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; margin-bottom: 14px;
  }
  .prog-fill { height: 100%; background: var(--teal); width: 0%; transition: width 0.5s linear; border-radius: 2px; }

  .yt-btn {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,0,0,0.08); border: 1px solid rgba(255,0,0,0.2);
    border-radius: 10px; padding: 10px 12px; cursor: pointer;
    text-decoration: none; width: 100%;
  }
  .yt-btn:active { background: rgba(255,0,0,0.15); }
  .yt-icon {
    width: 28px; height: 28px; background: #FF0000;
    border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .yt-icon-play {
    width: 0; height: 0;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    border-left: 9px solid #fff;
    margin-left: 2px;
  }
  .yt-text-name { font-size: 13px; font-weight: 500; color: #ff8080; }
  .yt-text-src { font-size: 11px; color: rgba(255,128,128,0.6); margin-top: 1px; }

  .no-yt { font-size: 12px; color: var(--muted); padding: 4px 0; }

  .warning-box {
    margin: 16px 12px 0;
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 12px;
    color: #fca5a5;
    line-height: 1.6;
  }
</style>
</head>

  {
    phase: "3단계 — 코어 & 하체 강화",

      { icon:"🪑", name:"월 스쿼트 (벽 스쿼트)", badge:"3세트 × 30초", sub:"대퇴사두근 강화 · 허리 부담 없음", how:"벽에 등을 완전히 밀착하고 발을 앞으로 내밀어 무릎 90도 자세를 유지합니다. 등이 벽에서 떨어지지 않게 합니다.", caution:"무릎이 발끝보다 과도하게 앞으로 나가지 않게", sec:90, yt:"https://youtu.be/bGLtnwXocvc", ytname:"월 스쿼트 영상 보기", src:PNUH },

var openIdx = null;
var timers = {};

function fmt(s) {
  var m = Math.floor(s/60), r = s%60;
  return m > 0 ? m+":"+(r<10?"0":"")+r : r+"초";
}

function getEx(idx) {
  var c=0;
  for(var i=0;i<DATA.length;i++)
    for(var j=0;j<DATA[i].items.length;j++){
      if(c===idx) return DATA[i].items[j];
      c++;
    }
}

function toggle(idx) {
  openIdx = openIdx===idx ? null : idx;
  render();
}

function startTimer(idx) {
  var ex = getEx(idx);
  if(!timers[idx]) timers[idx]={rem:ex.sec,running:false,done:false};
  var ts = timers[idx];
  if(ts.done||ts.running) return;
  ts.running = true;
  ts._iv = setInterval(function(){
    ts.rem--;
    var el = document.getElementById("tnum"+idx);
    var fill = document.getElementById("tfill"+idx);
    if(ts.rem<=0){
      ts.rem=0; ts.done=true; ts.running=false;
      clearInterval(ts._iv);
      if(el) el.textContent="완료! 🎉";
      if(fill) fill.style.width="100%";
    } else {
      if(el) el.textContent=fmt(ts.rem);
      if(fill) fill.style.width=Math.round((ex.sec-ts.rem)/ex.sec*100)+"%";
    }
  },1000);
  render();
}

function resetTimer(idx) {
  var ex=getEx(idx), ts=timers[idx];
  if(ts&&ts._iv) clearInterval(ts._iv);
  timers[idx]={rem:ex.sec,running:false,done:false};
  render();
}

function render() {
  var html="", globalIdx=0;

  DATA.forEach(function(phase){
    html+='<div class="section-header">';
    html+='<div class="section-dot" style="background:'+phase.color+'"></div>';
    html+='<div class="section-title">'+phase.phase+'</div>';
    html+='<div class="section-badge" style="background:'+phase.dimColor+';color:'+phase.color+'">'+phase.time+'</div>';
    html+='</div>';

    phase.items.forEach(function(ex){
      var idx=globalIdx++;
      var isOpen=openIdx===idx;
      var ts=timers[idx]||{rem:ex.sec,running:false,done:false};
      var pct=Math.round((ex.sec-ts.rem)/ex.sec*100);

      html+='<div class="card'+(isOpen?' open':'')+'" id="card'+idx+'">';
      html+='<div class="card-header" onclick="toggle('+idx+')">';
      html+='<div class="card-icon" style="background:'+phase.dimColor+'">'+ex.icon+'</div>';
      html+='<div class="card-info">';
      html+='<div class="card-name">'+ex.name+'</div>';
      html+='<div class="card-sub">'+ex.sub+'</div>';
      html+='</div>';
      html+='<div class="card-badge">'+ex.badge+'</div>';
      html+='<div class="card-arrow">▼</div>';
      html+='</div>';

      if(isOpen){
        html+='<div class="card-body">';
        html+='<div class="how-to">'+ex.how+'</div>';
        html+='<div class="caution">⚠️ '+ex.caution+'</div>';
        html+='<div class="timer-row">';
        html+='<div class="timer-num" id="tnum'+idx+'">'+(ts.done?"완료! 🎉":fmt(ts.rem))+'</div>';
        html+='<button class="tbtn start" onclick="event.stopPropagation();startTimer('+idx+')">'+(ts.running?"⏸ 진행중":"▶ 시작")+'</button>';
        html+='<button class="tbtn" onclick="event.stopPropagation();resetTimer('+idx+')">↺</button>';
        html+='</div>';
        html+='<div class="prog-track"><div class="prog-fill" id="tfill'+idx+'" style="width:'+pct+'%"></div></div>';
        if(ex.yt){
          html+='<a class="yt-btn" href="'+ex.yt+'" target="_blank" onclick="event.stopPropagation()">';
          html+='<div class="yt-icon"><div class="yt-icon-play"></div></div>';
          html+='<div><div class="yt-text-name">'+ex.ytname+'</div><div class="yt-text-src">'+ex.src+'</div></div>';
          html+='</a>';
        } else {
          html+='<div class="no-yt">🚶 실내 이동 또는 동네 걷기로 대체</div>';
        }
        html+='</div>';
      }
      html+='</div>';
    });
  });

  document.getElementById("app").innerHTML=html;
}

render();
</script>
